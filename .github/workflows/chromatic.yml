name: Chromatic Deployment

# Deploy Storybook to Chromatic on every push to main and every PR
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  chromatic:
    # Dependabot-Läufe bekommen keine Actions-Secrets (CHROMATIC_PROJECT_TOKEN
    # fehlt) — und visuelle Regression auf Dependency-Bumps braucht es nicht.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Chromatic needs full git history for baselines
      
      - uses: pnpm/action-setup@v6
      
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Install Playwright browsers
        run: pnpm --filter @samisdat/ui-components exec playwright install chromium --with-deps
      
      - name: Build panorama library
        run: pnpm build:lib
      
      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: packages/ui-components
          buildScriptName: build-storybook
          # Only run visual tests on PRs, skip on main
          skip: ${{ github.ref == 'refs/heads/main' && 'true' || 'false' }}
          # Auto-accept changes on main branch
          autoAcceptChanges: main
