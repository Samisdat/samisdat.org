name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v4

  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      
      - uses: pnpm/action-setup@v6
      
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Install Playwright browsers
        run: pnpm --filter @samisdat/ui-components exec playwright install chromium --with-deps
      
      - name: Lint CSS
        run: pnpm lint:css
      
      - name: Lint hardcoded colors
        run: pnpm lint:colors
      
      - name: Lint JavaScript/TypeScript
        run: pnpm lint
      
      - name: Build panorama library
        run: pnpm build:lib
      
      - name: Typecheck
        run: pnpm -r exec tsc --noEmit
      
      - name: Check version consistency
        run: pnpm syncpack lint
      
      - name: Run tests
        run: |
          pnpm --filter @samisdat/website test:ci
          pnpm --filter @samisdat/ui-components test:ci
      
      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: packages/website/.next/cache
          key: ${{ runner.os }}-next-build-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('packages/website/**/*.[jt]s', 'packages/website/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-next-build-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-next-build-
      
      - name: Build website
        run: pnpm --filter @samisdat/website build
      
      - name: Build Storybook
        run: pnpm build-storybook
