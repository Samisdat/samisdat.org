name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      
      - uses: pnpm/action-setup@v6
      
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Install Playwright browsers
        run: pnpm --filter @samisdat/ui-components exec playwright install chromium --with-deps
      
      - name: Lint CSS
        run: pnpm lint:css
      
      - name: Lint hardcoded colors
        run: pnpm lint:colors
      
      - name: Lint JavaScript/TypeScript
        run: pnpm lint
      
      - name: Build panorama library
        run: pnpm build:lib
      
      - name: Typecheck
        run: pnpm -r exec tsc --noEmit
      
      - name: Check version consistency
        run: pnpm syncpack lint
      
      - name: Run tests
        run: |
          pnpm --filter @samisdat/website test:ci
          pnpm --filter @samisdat/ui-components test:ci
      
      - name: Build website
        run: pnpm --filter @samisdat/website build
      
      - name: Build Storybook
        run: pnpm build-storybook
